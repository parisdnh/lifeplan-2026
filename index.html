<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Livsplan ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="site-header">
  <div class="container">
    <div class="brand">
      <h1>Min <em>Livsplan</em> 🌺</h1>
      <p>Jun 2026 → Jan 2027 · Norge → Europa → Brasil → Latin-Amerika</p>
    </div>
    <div class="header-actions">
      <button class="save-btn" onclick="saveAll()">💾 Lagre</button>
      <span class="save-indicator" id="save-indicator">Lagret 💗</span>
    </div>
  </div>
</header>

<div class="container">

  <!-- ── Tabs ───────────────────────────────────────────────── -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('timeline',this)">📅 Tidslinje</button>
    <button class="tab-btn"        onclick="showTab('budget',this)">💰 Budsjett</button>
    <button class="tab-btn"        onclick="showTab('goals',this)">⭐ Mål</button>
    <button class="tab-btn"        onclick="showTab('spareplan',this)">💸 Spareplan</button>
  </div>

  <!-- ── Timeline panel ─────────────────────────────────────── -->
  <div id="panel-timeline" class="panel active">
    <div id="timeline"></div>
  </div>

  <!-- ── Budget panel ───────────────────────────────────────── -->
  <div id="panel-budget" class="panel">
    <div class="budget-metrics" id="budget-metrics"></div>
    <div id="budget-sections"></div>
    <div style="text-align:right; margin-top:8px">
      <button onclick="resetBudget()" style="font-size:12px; padding:6px 14px; border:1.5px solid var(--border); border-radius:var(--radius-pill); background:none; color:var(--text-muted); cursor:pointer; font-family:'Nunito',sans-serif">🔄 Tilbakestill budsjett</button>
    </div>
  </div>

  <!-- ── Goals panel ────────────────────────────────────────── -->
  <div id="panel-goals" class="panel">
    <div class="goals-grid" id="goals-list"></div>
    <div class="add-goal-row">
      <input id="new-goal-title" placeholder="Nytt mål… ✨" />
      <input id="new-goal-desc"  placeholder="Kort beskrivelse" />
      <button onclick="addGoal()">+ Legg til</button>
    </div>
  </div>

  <!-- ── Spareplan panel ───────────────────────────────────────── -->
  <div id="panel-spareplan" class="panel">
    <div id="spareplan-content"></div>
  </div>

</div><!-- /container -->

<button class="agent-fab" id="agent-fab" onclick="togglePersistentChat()">
  ✨ Tilpass plan
</button>

<div class="persistent-panel" id="persistent-panel">
  <div class="persistent-header">
    <div style="display:flex; align-items:center; gap:10px">
      <div class="chat-avatar" style="width:34px;height:34px;font-size:17px">🤖</div>
      <div>
        <div class="chat-title">Tilpass planen</div>
        <div class="chat-subtitle">Be AI-en endre og forbedre</div>
      </div>
    </div>
    <button class="persistent-close" onclick="closePersistentChat()">✕</button>
  </div>
  <div id="persistent-api-section" style="display:none; padding:16px; flex-shrink:0; background:var(--surface); border-bottom:1.5px solid var(--border)">
    <p style="font-size:12px; color:var(--text-muted); margin:0 0 8px">Skriv inn Anthropic API-nøkkel:</p>
    <div style="display:flex; gap:8px">
      <input type="password" id="persistent-api-input" placeholder="sk-ant-…"
             style="flex:1; font-size:13px; padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--radius-pill); background:var(--surface2); color:var(--text); font-family:'Nunito',sans-serif; outline:none"
             onkeydown="if(event.key==='Enter')savePersistentApiKey()" />
      <button onclick="savePersistentApiKey()" style="padding:8px 16px; font-size:12px; font-weight:700; border:none; border-radius:var(--radius-pill); background:linear-gradient(135deg,var(--pink),var(--pink-deep)); color:#fff; cursor:pointer; font-family:'Nunito',sans-serif; white-space:nowrap">Start</button>
    </div>
    <p style="font-size:11px; color:var(--text-muted); margin:6px 0 0">Finn nøkkelen på <strong>console.anthropic.com</strong> → API Keys</p>
  </div>
  <div class="persistent-messages" id="persistent-messages"></div>
  <div class="progress-section" id="persistent-updating" style="display:none">
    <div class="progress-label" id="upd-label">Tolker forespørselen…</div>
    <div class="progress-track">
      <div class="progress-fill" id="upd-bar"></div>
    </div>
  </div>
  <div class="chat-input-row" id="persistent-input-row" style="display:none">
    <input type="text" id="persistent-input"
           placeholder="Fortell mer eller be om endringer…"
           onkeydown="if(event.key==='Enter')sendPersistentMessage()" />
    <button onclick="sendPersistentMessage()">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/agent.js"></script>
</body>
</html>
